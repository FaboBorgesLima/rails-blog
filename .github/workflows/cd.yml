name: Deploy

on:
  push:
    tags:
      - "v*.*.*"

env:
  IMAGE: faboborgeslima/rails-blog

jobs:
  # ── 1. CI gate ──────────────────────────────────────────────────────────────
  ci:
    name: CI (lint / security / tests)
    uses: ./.github/workflows/ci.yml

  # ── 2. Build & push Docker image ────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Kubernetes ──────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Prepare manifests and apply secrets
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          # Generate secret manifest
          kubectl create secret generic rails-blog-secrets \
            --from-literal=DB_HOST="${DB_HOST}" \
            --from-literal=DB_NAME="${DB_NAME}" \
            --from-literal=DB_USERNAME="${DB_USERNAME}" \
            --from-literal=DB_PASSWORD="${DB_PASSWORD}" \
            --from-literal=RAILS_MASTER_KEY="${RAILS_MASTER_KEY}" \
            --from-literal=REDIS_URL="${REDIS_URL}" \
            --save-config \
            --dry-run=client -o yaml | kubectl apply -f -

          # Inject image tag into deployment manifest
          sed "s/VERSION/${IMAGE_TAG}/g" kubernetes/deployment.yaml > /tmp/deployment.yaml

      - name: Apply manifests & roll out new image
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
        run: |
          set -euo pipefail

          kubectl apply -f kubernetes/database.yaml
          kubectl apply -f kubernetes/redis.yaml
          kubectl apply -f kubernetes/ingress.yaml
          kubectl apply -f /tmp/deployment.yaml

          kubectl rollout status deployment/rails-blog-deployment --timeout=120s

      - name: Database Migrations
        run: |
          POD_NAME=$(kubectl get pods -l app=rails-blog --field-selector=status.phase=Running -o jsonpath="{.items[0].metadata.name}")

          echo "Executing migrations on pod: $POD_NAME"

          sleep 10 # wait a bit for the app to be fully ready

          kubectl exec $POD_NAME -- bin/rails db:migrate
          kubectl exec $POD_NAME -- bin/rails db:seed
