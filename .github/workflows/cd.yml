name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE: faboborgeslima/rails-blog

jobs:
  # ── 1. CI gate ──────────────────────────────────────────────────────────────
  ci:
    name: CI (lint / security / tests)
    uses: ./.github/workflows/ci.yml

  # ── 2. Build & push Docker image ────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: ci
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Kubernetes via SSH ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy Kubernetes manifests and scripts to server
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" mkdir -p /tmp/blog-deploy/
          scp -P "${{ secrets.SSH_PORT }}" -r kubernetes/ scripts/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/blog-deploy/"

      - name: Apply manifests & roll out new image
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          SSH_TARGET: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "$SSH_TARGET" bash -s <<EOF
            set -euo pipefail

            # Render and apply the secret (upsert)
            export DB_HOST='${DB_HOST}'
            export DB_NAME='${DB_NAME}'
            export DB_USERNAME='${DB_USERNAME}'
            export DB_PASSWORD='${DB_PASSWORD}'
            export RAILS_MASTER_KEY='${RAILS_MASTER_KEY}'
            export REDIS_URL='${REDIS_URL}'
            envsubst < /tmp/blog-deploy/kubernetes/secrets-example.yaml | kubectl apply -f -

            # Apply CNPG Database, Redis, Deployment, IngressRoute
            kubectl apply -f /tmp/blog-deploy/kubernetes/database.yaml
            kubectl apply -f /tmp/blog-deploy/kubernetes/redis.yaml
            kubectl apply -f /tmp/blog-deploy/kubernetes/deployment.yaml
            kubectl apply -f /tmp/blog-deploy/kubernetes/ingress.yaml

            # Update the running image and wait for rollout
            kubectl set image deployment/rails-blog-deployment \
              rails-blog=faboborgeslima/rails-blog:${IMAGE_TAG}

            kubectl rollout status deployment/rails-blog-deployment --timeout=120s

            # Cleanup
            rm -rf /tmp/blog-deploy/
          EOF
